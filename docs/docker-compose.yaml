name: pai_smart

services:
  mysql:
    container_name: mysql
    image: mysql:8
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: PaiSmart2025
      MYSQL_DATABASE: PaiSmart
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pai-net
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --explicit_defaults_for_timestamp=true --lower_case_table_names=1 --innodb-buffer-pool-size=256M --max-connections=50 --table-open-cache=400 --innodb-flush-log-at-trx-commit=2
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      start_period: 5s
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: always
    ports:
      - "19000:19000"
      - "19001:19001"
    volumes:
      - minio-data:/data
    networks:
      - pai-net
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: PaiSmart2025
    deploy:
      resources:
        limits:
          memory: 256m
    command: server /data --console-address ":19000" --address ":19001"

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pai-net
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      start_period: 5s
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --bind 0.0.0.0 --port 6379 --requirepass PaiSmart2025 --appendonly yes --maxmemory 96mb --maxmemory-policy allkeys-lru

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - pai-net
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CFG_LISTENERS=CONTROLLER://:9093,PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
    volumes:
      - kafka-data:/bitnami/kafka
    deploy:
      resources:
        limits:
          memory: 768m
    command:
      - sh
      - -c
      - |
        /opt/bitnami/scripts/kafka/run.sh &
        echo "Waiting for Kafka to start..."
        while ! kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null; do
          sleep 2
        done
        echo "Creating topic: file-processing"
        kafka-topics.sh --create --bootstrap-server localhost:9092 --replication-factor 1 --partitions 1 --topic file-processing 2>/dev/null || true
        echo "Creating topic: vectorization"
        kafka-topics.sh --create --bootstrap-server localhost:9092 --replication-factor 1 --partitions 1 --topic vectorization 2>/dev/null || true
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  es:
    image: elasticsearch:8.10.4
    container_name: es
    restart: always
    ports:
      - 9200:9200
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - pai-net
    environment:
      - ELASTIC_PASSWORD=PaiSmart2025
      - node.name=pai-smart-es01
      - discovery.type=single-node
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=pai-smart-es-cluster
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - indices.memory.index_buffer_size=10%
      - cache.recycler.page.limit.heap=5%
    deploy:
      resources:
        limits:
          memory: 1024m
    command: >
      bash -c "
      if ! elasticsearch-plugin list | grep -q 'analysis-ik'; then
        echo 'Installing analysis-ik plugin...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      else
        echo 'analysis-ik plugin already installed.';
      fi;
      /usr/local/bin/docker-entrypoint.sh
      "
    healthcheck:
      test: ['CMD', 'curl', '-s', 'http://localhost:9200/_cluster/health?pretty']
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    container_name: backend
    image: crpi-r3qkhh5h65pj3yag.cn-shanghai.personal.cr.aliyuncs.com/zhiliao123/backend:latest
    restart: always
    ports:
      - "8081:8081"
    networks:
      - pai-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      es:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
    deploy:
      resources:
        limits:
          memory: 768m

networks:
  pai-net:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
  minio-data:
  kafka-data:
  es-data:
